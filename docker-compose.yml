version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
  kanban:
    build:
      dockerfile: Dockerfile
    ports:
      - "17808:17808"
    depends_on:
      - postgres
    environment:
      # Database connection — should match the postgres service above
      DB_USER: user
      DB_PASS: password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kanban
      # Application
      SERVER_PORT: 17808
      # Auth — change these before deploying
      ADMIN_USER: admin
      ADMIN_PASS: changeme
      SESSION_SECRET: change-this-to-a-long-random-string
volumes:
  postgres_data:
