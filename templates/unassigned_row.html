{{define "unassigned_row.html"}}
<section class="bg-gray-200 dark:bg-gray-800/40 rounded-xl shadow-md">
  <div class="flex items-center justify-between px-4 py-2">
    <div class="flex items-center gap-2">
      <button
        type="button"
        onclick="toggleUnassignedRow()"
        class="text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
        title="Toggle Unassigned"
      >
        <i id="toggle-icon-unassigned" class="bi bi-chevron-right text-sm"></i>
      </button>
      <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-700 dark:text-gray-200">Unassigned</h2>
    </div>
  </div>

  <div id="row-unassigned" class="px-2 pb-3 hidden">
    <div class="flex flex-wrap gap-3">
      {{range .Tickets}}
      <div class="bg-white dark:bg-gray-700 rounded-lg px-2 py-2 shadow-md border border-red-500 min-w-[14rem]">
        {{if eq .GroupID 33000158516}}
          <span class="text-sm font-semibold text-red-600 mr-1">T</span>
        {{else}}
          <span class="text-sm font-semibold text-blue-900 dark:text-blue-200 mr-1">S</span>
        {{end}}<a href="https://{{$.Domain}}/a/tickets/{{.ID}}?current_tab=details" target="_blank"
           class="text-sm font-semibold text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 mr-1">#{{.ID}}</a><span class="text-sm font-semibold text-gray-900 dark:text-white leading-tight">{{truncate .Subject 32}}</span>
      </div>
      {{else}}
      <p class="text-xs text-gray-400 dark:text-gray-500 italic">No unassigned tickets</p>
      {{end}}
    </div>
  </div>
</section>
{{end}}
