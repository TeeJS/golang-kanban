{{define "card_edit_fragment.html"}}
<form
  hx-post="/card/{{.ID}}/update"
  hx-target="#card-{{.ID}}"
  hx-swap="outerHTML"
  onsubmit="return prepareSubtasks(this)"
  class="p-6"
>
  <!-- Header -->
  <div class="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-gray-600 pb-4">
    <h5 class="text-xl font-bold text-gray-900 dark:text-white">Edit Card</h5>
    <button
      type="button"
      class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
      onclick="hideModal('editCardModal')"
      aria-label="Close"
    >
      <i class="bi bi-x text-2xl"></i>
    </button>
  </div>

  <!-- Title -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Title</label>
    <input
      type="text"
      name="title"
      value="{{.Title}}"
      placeholder="Card Title"
      class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
    >
  </div>

  <!-- Description -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
    <textarea
      name="description"
      placeholder="Description"
      rows="3"
      class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
    >{{.Description}}</textarea>
  </div>

  <!-- Subtasks -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Subtasks</label>
    <div class="subtasks-container space-y-2">
      {{range $subtask := parseSubtasks .Subtasks}}
      <div class="subtask-row flex items-center space-x-2">
        <input
          type="checkbox"
          class="subtask-complete w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
          {{if $subtask.Completed}}checked{{end}}
        >
        <input
          type="text"
          class="subtask-text flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm"
          placeholder="Subtask description"
          value="{{$subtask.Text}}"
        >
        <button type="button" class="remove-subtask-btn text-red-500 hover:text-red-700 p-1" title="Remove">
          <i class="bi bi-x text-lg"></i>
        </button>
      </div>
      {{end}}
    </div>
    <button type="button" class="mt-2 bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm add-subtask-btn">
      <i class="bi bi-plus mr-1"></i>Add Subtask
    </button>
    <input type="hidden" name="subtasks" class="subtasks-hidden">
  </div>

  <!-- Footer -->
  <div class="flex justify-between items-center border-t border-gray-200 dark:border-gray-600 pt-4">
    <button
      type="button"
      class="text-red-600 hover:text-red-800 dark:text-red-500 dark:hover:text-red-400 flex items-center gap-1 text-sm"
      hx-post="/card/{{.ID}}/delete"
      hx-target="#card-{{.ID}}"
      hx-swap="delete"
      hx-confirm="Delete this card?"
      onclick="hideModal('editCardModal')"
    >
      <i class="bi bi-trash"></i> Delete
    </button>

    <div class="flex gap-3">
      <button
        type="button"
        class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 rounded-lg"
        onclick="hideModal('editCardModal')"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg"
      >
        Save
      </button>
    </div>
  </div>
</form>
{{end}}
