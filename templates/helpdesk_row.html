{{define "helpdesk_row.html"}}
<section class="bg-gray-200 dark:bg-gray-800/40 rounded-xl shadow-md">
  <div class="flex items-center justify-between px-4 py-2">
    <div class="flex items-center gap-2">
      <button
        type="button"
        onclick="toggleHelpdeskRow()"
        class="text-gray-700 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
        title="Toggle Helpdesk"
      >
        <i id="toggle-icon-helpdesk" class="bi bi-chevron-right text-sm"></i>
      </button>
      <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-700 dark:text-gray-200">
        Helpdesk
      </h2>
    </div>
  </div>

  <div id="row-helpdesk" class="px-2 pb-3 hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-6">
      {{range .Columns}}
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6">
        <div class="flex items-center justify-between mb-4 border-b border-gray-200 dark:border-gray-600 pb-2">
          <h3 class="text-xl font-bold text-gray-700 dark:text-gray-300">{{.Name}}</h3>
        </div>
        <div class="space-y-3">
          {{range .Tickets}}
          <div class="bg-white dark:bg-gray-700 rounded-lg px-2 py-2 shadow-md border {{if isTicketOverdue .DueBy}}border-red-500{{else}}border-gray-200 dark:border-gray-600{{end}}">
            <a href="https://{{$.Domain}}/a/tickets/{{.ID}}?current_tab=details" target="_blank"
               class="text-sm font-semibold text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 mr-1">#{{.ID}}</a><span class="text-sm font-semibold text-gray-900 dark:text-white leading-tight">{{truncate .Subject 32}}</span>
          </div>
          {{else}}
          <p class="text-xs text-gray-400 dark:text-gray-500 italic">No tickets</p>
          {{end}}
        </div>
      </div>
      {{end}}
    </div>
  </div>
</section>
{{end}}
